<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 style="color: magenta;">Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">

            <button id="searchBtn">Search </button>
            <button id="locationBtn">Use My location</button>
            <div id="loading" class="spinner"></div>
        </div>

        <div class="weather-card">

            <h2 id="cityName">City Name</h2>

            <img id="weatherIcon" src="" alt="Weather Icon">

            <h3 id="temperature">0°C</h3>

            <p id="description">Weather Description</p>

            <div class="details">

                <p id="humidity"> Humidity: 0% </p>
                <p id="wind">Wind: 0 km/h</p>

              <div id="forecast"></div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
